name: Validate stickers

on:
  pull_request:
    paths:
      - "data/stickers.yaml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pyyaml
      - name: Validate data
        run: python3 scripts/validate.py
